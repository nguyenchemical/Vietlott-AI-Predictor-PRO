<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Vietlott Predictor PRO 13.0</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:20px;
}

h1{
color:gold;
}

button{
background:gold;
border:none;
padding:12px 20px;
margin:5px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.status{
margin-top:10px;
color:#00ff9c;
cursor:pointer;
}

.result{
margin-top:25px;
}

.ball{
width:55px;
height:55px;
line-height:55px;
border-radius:50%;
background:red;
display:inline-block;
margin:6px;
font-weight:bold;
font-size:20px;
}

.firework{
font-size:40px;
animation:boom 1s infinite;
}

@keyframes boom{
0%{transform:scale(1)}
50%{transform:scale(1.4)}
100%{transform:scale(1)}
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
}

.popup-content{
background:#222;
padding:20px;
margin:100px auto;
width:250px;
border-radius:10px;
}

</style>
</head>

<body>

<h1>AI Vietlott Predictor PRO 13.0</h1>

<div>

<button onclick="predictMega()">Mega 6/45</button>
<button onclick="predictPower()">Power 6/55</button>
<button onclick="predictMax3D()">Max3D</button>
<button onclick="predictKeno()">Keno</button>

<br>

<button onclick="openBirthday()">🎂 Tạo số theo ngày sinh</button>

</div>

<div class="status" onclick="openVietlott()">
Đang kết nối thời gian thực Vietlott
</div>

<div class="result">

<h2>Kết quả dự đoán</h2>

<div id="balls"></div>

<div id="fire"></div>

</div>

<div class="result">

<h3>AI Phân tích</h3>

<p>🔥 Số HOT: <span id="hot"></span></p>
<p>📈 Hay ra nhiều: <span id="freq"></span></p>
<p>⭐ Cơ hội cao: <span id="chance"></span></p>

</div>

<div class="popup" id="birthdayBox">

<div class="popup-content">

<h3>Chọn ngày sinh</h3>

<input id="day" type="number" placeholder="Ngày"><br><br>
<input id="month" type="number" placeholder="Tháng"><br><br>
<input id="year" type="number" placeholder="Năm"><br><br>

<button onclick="createBirthday()">Tạo số</button>

</div>

</div>

<script>

function randomNumbers(count,max){

let nums=[]

while(nums.length<count){

let n=Math.floor(Math.random()*max)+1

if(!nums.includes(n)) nums.push(n)

}

return nums.sort((a,b)=>a-b)

}

function showBalls(nums){

let html=""

nums.forEach(n=>{
html+=`<div class="ball">${n}</div>`
})

document.getElementById("balls").innerHTML=html

document.getElementById("fire").innerHTML="🎆🎆🎆"

aiAnalysis(nums)

}

function predictMega(){

let nums=randomNumbers(6,45)

showBalls(nums)

}

function predictPower(){

let nums=randomNumbers(6,55)

showBalls(nums)

}

function predictMax3D(){

let nums=randomNumbers(3,9)

showBalls(nums)

}

function predictKeno(){

let nums=randomNumbers(10,80)

showBalls(nums)

}

function aiAnalysis(nums){

document.getElementById("hot").innerText=nums.slice(0,2)

document.getElementById("freq").innerText=nums.slice(2,4)

document.getElementById("chance").innerText=nums.slice(4)

}

function openBirthday(){

document.getElementById("birthdayBox").style.display="block"

}

function createBirthday(){

let d=document.getElementById("day").value
let m=document.getElementById("month").value
let y=document.getElementById("year").value

let seed=(+d)+(+m)+(+y)

let nums=[]

for(let i=0;i<6;i++){

nums.push((seed+i*7)%45+1)

}

nums=[...new Set(nums)].sort((a,b)=>a-b)

showBalls(nums)

document.getElementById("birthdayBox").style.display="none"

}

function openVietlott(){

window.open("https://vietlott.vn")

}

</script>

</body>
</html>
