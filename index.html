<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vietlott AI Predictor PRO 15 ULTRA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0f172a;
color:white;
text-align:center;
}

.container{
max-width:520px;
margin:auto;
padding:20px;
}

h1{
margin-top:10px;
}

button{
padding:10px 16px;
margin:6px;
border:none;
border-radius:30px;
background:gold;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:20px;
min-height:70px;
}

.ball{
display:inline-block;
width:45px;
height:45px;
line-height:45px;
border-radius:50%;
background:gold;
color:black;
font-weight:bold;
margin:5px;
font-size:18px;
}

#realtime{
font-size:14px;
opacity:0.8;
cursor:pointer;
}

.popup{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.popup-content{
background:#1e293b;
padding:20px;
border-radius:10px;
}

select{
padding:8px;
margin:5px;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<canvas id="firework"></canvas>

<div class="container">

<h1>Vietlott AI Predictor</h1>

<div id="realtime" onclick="openVietlott()">
Đang kết nối thời gian thực Vietlott
</div>

<br>

<button onclick="predictMega()">Dự đoán Mega 6/45</button>

<button onclick="predictPower()">Dự đoán Power 6/55</button>

<button onclick="predictJackpotMega()">AI Jackpot Mega</button>

<button onclick="predictJackpotPower()">AI Jackpot Power</button>

<button onclick="openBirth()">Tạo theo ngày sinh</button>

<div class="result" id="result"></div>

</div>


<!-- POPUP NGÀY SINH -->

<div class="popup" id="birthPopup">

<div class="popup-content">

<h3>Chọn ngày sinh</h3>

<select id="day"></select>
<select id="month"></select>
<select id="year"></select>

<br><br>

<button onclick="generateBirth()">Tạo số</button>
<button onclick="closeBirth()">Đóng</button>

</div>

</div>

<script>

let result=document.getElementById("result")

function randomNumbers(max,count){

let nums=[]

while(nums.length<count){

let n=Math.floor(Math.random()*max)+1

if(!nums.includes(n)) nums.push(n)

}

return nums.sort((a,b)=>a-b)

}

function showNumbers(nums){

result.innerHTML=""

nums.forEach(n=>{

let ball=document.createElement("div")
ball.className="ball"
ball.innerText=n
result.appendChild(ball)

})

fireworks()

}

function predictMega(){

showNumbers(randomNumbers(45,6))

}

function predictPower(){

let nums=randomNumbers(55,6)
nums.push("|")
nums.push(Math.floor(Math.random()*55)+1)

showNumbers(nums)

}

function predictJackpotMega(){

let nums=randomNumbers(45,6)

showNumbers(nums)

}

function predictJackpotPower(){

let nums=randomNumbers(55,6)
nums.push("|")
nums.push(Math.floor(Math.random()*55)+1)

showNumbers(nums)

}

function openVietlott(){

window.open("https://vietlott.vn")

}

function openBirth(){

document.getElementById("birthPopup").style.display="flex"

}

function closeBirth(){

document.getElementById("birthPopup").style.display="none"

}

function generateBirth(){

let d=document.getElementById("day").value
let m=document.getElementById("month").value
let y=document.getElementById("year").value

let seed=parseInt(d)+parseInt(m)+parseInt(y)

let nums=[]

while(nums.length<6){

let n=(seed*Math.random()*100)%45
n=Math.floor(n)+1

if(!nums.includes(n)) nums.push(n)

}

showNumbers(nums)

closeBirth()

}

for(let i=1;i<=31;i++){

let o=document.createElement("option")
o.value=i
o.text=i
day.appendChild(o)

}

for(let i=1;i<=12;i++){

let o=document.createElement("option")
o.value=i
o.text=i
month.appendChild(o)

}

for(let i=1950;i<=2025;i++){

let o=document.createElement("option")
o.value=i
o.text=i
year.appendChild(o)

}


/* FIREWORK */

const canvas=document.getElementById("firework")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

function fireworks(){

for(let i=0;i<80;i++){

particles.push({

x:canvas.width/2,
y:canvas.height,
vx:(Math.random()-0.5)*6,
vy:-Math.random()*8,
life:60

})

}

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

p.x+=p.vx
p.y+=p.vy
p.vy+=0.1
p.life--

ctx.fillStyle="gold"
ctx.fillRect(p.x,p.y,3,3)

})

particles=particles.filter(p=>p.life>0)

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
