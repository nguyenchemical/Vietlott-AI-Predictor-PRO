<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vietlott Predictor Pro</title>
<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:20px;
}
h1{color:#22c55e}
.container{
    max-width:600px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}
select,button{
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
}
button{
    background:#22c55e;
    color:black;
    font-weight:bold;
    cursor:pointer;
}
.result{
    margin-top:15px;
    font-size:22px;
    color:#facc15;
}
.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:10px;
}
.tabs select{
    width:30%;
}
</style>
</head>
<body>

<h1>🎯 Vietlott Predictor Pro</h1>

<div class="container">

<h3>Chọn sản phẩm</h3>
<select id="game">
<option value="mega">Mega 6/45</option>
<option value="power">Power 6/55</option>
<option value="lotto">Lotto 5/35</option>
<option value="keno">Keno</option>
<option value="bingo">Bingo 18</option>
<option value="max3d">Max 3D</option>
<option value="max3dpro">Max 3D Pro</option>
</select>

<h3>Tạo số theo ngày sinh</h3>

<div class="tabs">
<select id="day"></select>
<select id="month"></select>
<select id="year"></select>
</div>

<button onclick="generateByDOB()">Tạo số</button>

<div class="result" id="result"></div>

</div>

<script>

// Tạo danh sách ngày tháng năm
for(let d=1; d<=31; d++){
    document.getElementById("day").innerHTML += `<option value="${d}">${d}</option>`;
}
for(let m=1; m<=12; m++){
    document.getElementById("month").innerHTML += `<option value="${m}">${m}</option>`;
}
for(let y=1950; y<=2026; y++){
    document.getElementById("year").innerHTML += `<option value="${y}">${y}</option>`;
}

// Hàm chuẩn hóa số về giới hạn
function normalize(num,max){
    return ((num % max) + max) % max + 1;
}

// Tạo seed từ ngày sinh (không thập phân)
function createSeed(day,month,year){
    return day*1000000 + month*10000 + year;
}

// Bộ tạo số giả ngẫu nhiên dựa seed
function seededRandom(seed){
    let x = Math.sin(seed) * 10000;
    return Math.floor((x - Math.floor(x)) * 1000000);
}

function generateByDOB(){

    let game = document.getElementById("game").value;
    let day = parseInt(document.getElementById("day").value);
    let month = parseInt(document.getElementById("month").value);
    let year = parseInt(document.getElementById("year").value);

    let seed = createSeed(day,month,year);
    let numbers = [];

    function uniquePush(num,max){
        let n = normalize(num,max);
        while(numbers.includes(n)){
            n = normalize(n+1,max);
        }
        numbers.push(n);
    }

    if(game==="mega"){
        for(let i=0;i<6;i++){
            uniquePush(seededRandom(seed+i),45);
        }
    }

    if(game==="power"){
        for(let i=0;i<6;i++){
            uniquePush(seededRandom(seed+i),55);
        }
    }

    if(game==="lotto"){
        for(let i=0;i<5;i++){
            uniquePush(seededRandom(seed+i),35);
        }
    }

    if(game==="keno"){
        for(let i=0;i<10;i++){
            uniquePush(seededRandom(seed+i),80);
        }
    }

    if(game==="bingo"){
        for(let i=0;i<18;i++){
            uniquePush(seededRandom(seed+i),90);
        }
    }

    if(game==="max3d"){
        numbers.push(normalize(seededRandom(seed),1000));
    }

    if(game==="max3dpro"){
        numbers.push(normalize(seededRandom(seed),1000));
        numbers.push(normalize(seededRandom(seed+1),1000));
    }

    numbers.sort((a,b)=>a-b);

    document.getElementById("result").innerHTML = numbers.join(" - ");
}

</script>

</body>
</html>
