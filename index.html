<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vietlott ULTRA AI</title>

<!-- Font thư pháp -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Playfair Display', serif;
background:linear-gradient(135deg,#fde68a,#fca5a5);
text-align:center;
padding:20px;
}

.container{
max-width:750px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

h1{
color:#b45309;
margin-bottom:5px;
}

.badge{
display:inline-block;
background:#f59e0b;
color:white;
padding:5px 15px;
border-radius:20px;
font-size:12px;
margin-bottom:15px;
box-shadow:0 0 15px #f59e0b;
}

select,button{
padding:10px;
margin:6px;
border-radius:10px;
border:none;
font-family:'Playfair Display', serif;
}

button{
background:#f59e0b;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #f59e0b;
}

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:10px;
}

.number-ball{
display:inline-block;
background:#facc15;
color:black;
padding:12px 16px;
margin:6px;
border-radius:50%;
font-weight:bold;
box-shadow:0 0 10px rgba(250,204,21,0.8);
animation:pop 0.3s ease;
}

@keyframes pop{
from{transform:scale(0.6);}
to{transform:scale(1);}
}

.info{
margin-top:10px;
font-size:14px;
color:#b45309;
}

</style>
</head>
<body>

<div class="container">

<h1>🎯 Vietlott ULTRA AI</h1>
<div class="badge">AI Edition</div>

<h3>Chọn sản phẩm</h3>
<select id="game">
<option value="mega">Mega 6/45</option>
<option value="power">Power 6/55</option>
<option value="lotto">Lotto 5/35</option>
<option value="keno">Keno</option>
<option value="bingo">Bingo 18</option>
<option value="max3d">Max 3D</option>
<option value="max3dpro">Max 3D Pro</option>
</select>

<h3>Chọn ngày sinh</h3>
<div class="tabs">
<select id="day"></select>
<select id="month"></select>
<select id="year"></select>
</div>

<br>

<button onclick="generateByDOB()">🎂 Tạo số theo ngày sinh</button>
<button onclick="generateRandom()">🎲 Tạo số theo sản phẩm</button>

<div id="result"></div>
<div class="info" id="info"></div>

</div>

<script>

// Populate ngày tháng năm
for(let d=1; d<=31; d++)
document.getElementById("day").innerHTML+=`<option value="${d}">${d}</option>`;

for(let m=1; m<=12; m++)
document.getElementById("month").innerHTML+=`<option value="${m}">${m}</option>`;

for(let y=1950; y<=2026; y++)
document.getElementById("year").innerHTML+=`<option value="${y}">${y}</option>`;

// Lấy cấu hình
function getConfig(game){
if(game==="mega") return {count:6,max:45};
if(game==="power") return {count:6,max:55};
if(game==="lotto") return {count:5,max:35};
if(game==="keno") return {count:10,max:80};
if(game==="bingo") return {count:18,max:90};
if(game==="max3d") return {count:1,max:1000};
if(game==="max3dpro") return {count:2,max:1000};
}

function generateCore(config,seed){

let numbers=[];
let attempts=0;

while(numbers.length<config.count && attempts<10000){
let r=Math.floor(Math.random()*config.max)+1;
if(!numbers.includes(r)) numbers.push(r);
attempts++;
}

numbers.sort((a,b)=>a-b);
return numbers;
}

function displayNumbers(numbers){
let html="";
numbers.forEach(n=>{
html+=`<div class="number-ball">${n}</div>`;
});
document.getElementById("result").innerHTML=html;
}

// Theo ngày sinh
function generateByDOB(){
let game=document.getElementById("game").value;
let config=getConfig(game);

let d=parseInt(day.value);
let m=parseInt(month.value);
let y=parseInt(year.value);

let seed=d*1000000+m*10000+y;
Math.seedrandom=seed;

let numbers=generateCore(config,seed);
displayNumbers(numbers);
document.getElementById("info").innerHTML="🎂 Bộ số theo ngày sinh";
}

// Ngẫu nhiên theo sản phẩm
function generateRandom(){
let game=document.getElementById("game").value;
let config=getConfig(game);

let numbers=generateCore(config,Date.now());
displayNumbers(numbers);
document.getElementById("info").innerHTML="🎲 Bộ số ngẫu nhiên";
}

</script>
</body>
</html>
