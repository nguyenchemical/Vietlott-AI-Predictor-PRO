<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vietlott Ultra AI</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

.container{
    padding:20px;
}

h1{
    margin-top:20px;
}

select,button{
    padding:12px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    background:#ffcc00;
    font-weight:bold;
}

.result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

.toggle{
    position:fixed;
    top:15px;
    right:15px;
    background:#ffcc00;
    padding:8px 12px;
    border-radius:20px;
    font-size:14px;
}
</style>
</head>
<body>

<div class="toggle" onclick="toggleSound()">🔊 Âm thanh</div>

<div class="container">
<h1>Vietlott Ultra AI</h1>

<select id="gameType">
    <option value="6/45">Mega 6/45</option>
    <option value="6/55">Power 6/55</option>
    <option value="5/35">Lotto 5/35</option>
    <option value="bingo18">Bingo 18</option>
</select>

<br>

<button onclick="generate()">🎯 TẠO SỐ</button>

<div class="result" id="result"></div>
<div class="result" id="jackpot"></div>

</div>

<script>
/* ===============================
   ULTRA SOUND ENGINE (FIX 100%)
=================================*/

let audioCtx;
let soundEnabled = true;

function initAudio(){
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playTone(freq,duration){
    if(!soundEnabled) return;
    if(!audioCtx) initAudio();

    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.type = "sine";
    oscillator.frequency.value = freq;

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    gainNode.gain.setValueAtTime(0.2,audioCtx.currentTime);

    oscillator.start();
    oscillator.stop(audioCtx.currentTime + duration);
}

function playClick(){
    playTone(700,0.05);
}

function playResult(){
    playTone(400,0.08);
    setTimeout(()=>playTone(650,0.08),80);
}

function toggleSound(){
    soundEnabled = !soundEnabled;
    alert(soundEnabled ? "🔊 Đã bật âm thanh" : "🔇 Đã tắt âm thanh");
}

document.addEventListener("touchstart",initAudio,{once:true});
document.addEventListener("click",initAudio,{once:true});

/* ===============================
   RANDOM ENGINE
=================================*/

function getRandomNumbers(count,max){
    let nums = [];
    while(nums.length < count){
        let n = Math.floor(Math.random()*max)+1;
        if(!nums.includes(n)){
            nums.push(n);
        }
    }
    return nums.sort((a,b)=>a-b);
}

/* ===============================
   MAIN GENERATOR
=================================*/

function generate(){
    playClick();

    let type = document.getElementById("gameType").value;
    let resultDiv = document.getElementById("result");
    let jackpotDiv = document.getElementById("jackpot");

    let numbers = [];
    jackpotDiv.innerHTML = "";

    if(type==="6/45"){
        numbers = getRandomNumbers(6,45);
    }
    else if(type==="6/55"){
        numbers = getRandomNumbers(6,55);
        let power = Math.floor(Math.random()*55)+1;
        numbers.push(" | Power: "+power);
    }
    else if(type==="5/35"){
        numbers = getRandomNumbers(5,35);
    }
    else if(type==="bingo18"){
        numbers = getRandomNumbers(18,90);
    }

    resultDiv.innerHTML = "🎲 Bộ số: "+numbers.join(" ");

    // Jackpot AI dự đoán đơn giản (offline ML giả lập)
    let jackpot = getRandomNumbers(6,55);
    jackpotDiv.innerHTML = "💎 Dự đoán Jackpot: "+jackpot.join(" ");

    if(navigator.vibrate){
        navigator.vibrate(150);
    }

    playResult();
}
</script>

</body>
</html>
