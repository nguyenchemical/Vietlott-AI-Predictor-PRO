<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vietlott Predictor ULTRA AI</title>

<style>
:root{
--bg:#0f172a;
--card:#1e293b;
--text:white;
--accent:#22c55e;
--result:#facc15;
}

.light{
--bg:#f1f5f9;
--card:white;
--text:black;
--accent:#2563eb;
--result:#d97706;
}

body{
font-family:Arial;
background:var(--bg);
color:var(--text);
text-align:center;
padding:20px;
transition:0.3s;
}

h1{color:var(--accent)}

.container{
max-width:700px;
margin:auto;
background:var(--card);
padding:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

select,button{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
background:var(--accent);
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{opacity:0.85}

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:10px;
}

.result{
margin-top:15px;
font-size:20px;
color:var(--result);
}

canvas{
background:white;
border-radius:10px;
margin-top:20px;
}

.mode-toggle{
float:right;
cursor:pointer;
font-size:14px;
}

</style>
</head>
<body>

<div class="container">

<div class="mode-toggle" onclick="toggleMode()">🌙 Sáng/Tối</div>

<h1>🎯 Vietlott ULTRA AI</h1>

<h3>Chọn sản phẩm</h3>
<select id="game">
<option value="mega">Mega 6/45</option>
<option value="power">Power 6/55</option>
<option value="lotto">Lotto 5/35</option>
<option value="keno">Keno</option>
<option value="bingo">Bingo 18</option>
<option value="max3d">Max 3D</option>
<option value="max3dpro">Max 3D Pro</option>
</select>

<h3>Chiến lược AI</h3>
<select id="strategy">
<option value="balanced">Balanced</option>
<option value="aggressive">Aggressive (Hot)</option>
<option value="safe">Safe (Loại Cold)</option>
<option value="chaos">Random Chaos</option>
</select>

<h3>Tạo số theo ngày sinh</h3>

<div class="tabs">
<select id="day"></select>
<select id="month"></select>
<select id="year"></select>
</div>

<button onclick="runUltraAI()">Chạy ULTRA AI</button>

<div class="result" id="result"></div>

<canvas id="chart" width="600" height="250"></canvas>

</div>

<script>

// Populate ngày tháng năm
for(let d=1; d<=31; d++)
document.getElementById("day").innerHTML+=`<option value="${d}">${d}</option>`;

for(let m=1; m<=12; m++)
document.getElementById("month").innerHTML+=`<option value="${m}">${m}</option>`;

for(let y=1950; y<=2026; y++)
document.getElementById("year").innerHTML+=`<option value="${y}">${y}</option>`;

function normalize(n,max){
return ((n%max)+max)%max+1;
}

function rand(seed){
let x=Math.sin(seed)*10000;
return x-Math.floor(x);
}

function getConfig(game){
if(game==="mega") return {count:6,max:45};
if(game==="power") return {count:6,max:55};
if(game==="lotto") return {count:5,max:35};
if(game==="keno") return {count:10,max:80};
if(game==="bingo") return {count:18,max:90};
if(game==="max3d") return {count:1,max:1000};
if(game==="max3dpro") return {count:2,max:1000};
}

function simulateHotCold(max){
let freq=Array(max+1).fill(0);
for(let i=0;i<1000;i++){
let num=Math.floor(Math.random()*max)+1;
freq[num]++;
}
return freq;
}

function drawChart(freq){
let canvas=document.getElementById("chart");
let ctx=canvas.getContext("2d");
ctx.clearRect(0,0,600,250);
let maxVal=Math.max(...freq);
let barWidth=600/freq.length;

for(let i=1;i<freq.length;i++){
let height=(freq[i]/maxVal)*200;
ctx.fillStyle="#22c55e";
ctx.fillRect(i*barWidth,250-height,barWidth-1,height);
}
}

function runUltraAI(){

let game=document.getElementById("game").value;
let strategy=document.getElementById("strategy").value;
let config=getConfig(game);

let d=parseInt(document.getElementById("day").value);
let m=parseInt(document.getElementById("month").value);
let y=parseInt(document.getElementById("year").value);

let seed=d*1000000+m*10000+y+Date.now();

let freq=simulateHotCold(config.max);

let hot=freq.indexOf(Math.max(...freq));
let cold=freq.slice(1).indexOf(Math.min(...freq.slice(1)))+1;

let numbers=[];

while(numbers.length<config.count){

let r=Math.floor(rand(seed++)*config.max)+1;

if(strategy==="aggressive" && r!==hot) continue;
if(strategy==="safe" && r===cold) continue;

if(!numbers.includes(r)) numbers.push(r);
}

numbers.sort((a,b)=>a-b);

drawChart(freq);

document.getElementById("result").innerHTML=
`Kết quả: ${numbers.join(" - ")}<br>
🔥 Hot: ${hot} | ❄ Cold: ${cold}`;

}

function toggleMode(){
document.body.classList.toggle("light");
}

</script>

</body>
</html>
