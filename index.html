<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Vietlott Predictor PRO 12.0</title>

<style>

body{
font-family:Arial;
background:#0b0f1a;
color:white;
text-align:center;
padding:20px
}

h1{
color:#FFD700
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
background:#FFD700;
font-weight:bold
}

.box{
background:#111827;
padding:20px;
margin:20px auto;
border-radius:12px;
max-width:400px
}

.number{
display:inline-block;
background:#ff3b3b;
width:45px;
height:45px;
line-height:45px;
border-radius:50%;
margin:5px;
font-weight:bold;
font-size:18px
}

.status{
margin-top:15px;
color:#00ffcc;
cursor:pointer
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none
}

</style>
</head>

<body>

<h1>🤖 AI Vietlott Predictor PRO 12.0</h1>

<div class="box">

<h2>Mega 6/45</h2>

<button onclick="predictMega()">Dự đoán Mega</button>

<div id="mega"></div>

</div>


<div class="box">

<h2>Power 6/55</h2>

<button onclick="predictPower()">Dự đoán Power</button>

<div id="power"></div>

</div>


<div class="box">

<h2>🎯 Dự đoán Jackpot</h2>

<button onclick="predictJackpot()">AI Dự đoán Jackpot</button>

<div id="jackpot"></div>

</div>


<div class="status" onclick="openVietlott()">
📡 Đang kết nối thời gian thực Vietlott...
</div>

<canvas id="firework"></canvas>

<script>

function randomSet(max){

let nums=new Set()

while(nums.size<6){

nums.add(Math.floor(Math.random()*max)+1)

}

return [...nums].sort((a,b)=>a-b)

}

function render(id,arr){

let html=""

arr.forEach(n=>{
html+=`<span class="number">${n}</span>`
})

document.getElementById(id).innerHTML=html

firework()

}

function predictMega(){

let ai=randomSet(45)

render("mega",ai)

}

function predictPower(){

let ai=randomSet(55)

render("power",ai)

}

function predictJackpot(){

let ai=randomSet(55)

render("jackpot",ai)

}

function openVietlott(){

window.open("https://vietlott.vn","_blank")

}


/* FIREWORK */

let canvas=document.getElementById("firework")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

function firework(){

for(let i=0;i<80;i++){

let x=Math.random()*canvas.width
let y=Math.random()*canvas.height/2

ctx.beginPath()
ctx.arc(x,y,2,0,Math.PI*2)
ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)"
ctx.fill()

}

setTimeout(()=>ctx.clearRect(0,0,canvas.width,canvas.height),700)

}

</script>

</body>
</html>
