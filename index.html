<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vietlott ULTRA AI</title>
<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}
.container{
max-width:900px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:20px;
}
h1{color:#22c55e}
select,button{
padding:8px;
margin:5px;
border-radius:8px;
border:none;
}
button{
background:#22c55e;
font-weight:bold;
cursor:pointer;
}
.result{
margin-top:15px;
font-size:18px;
color:#facc15;
}
canvas{
background:white;
border-radius:10px;
margin-top:20px;
}
</style>
</head>
<body>

<div class="container">

<h1>🤖 Vietlott ULTRA AI</h1>

<select id="game">
<option value="mega">Mega 6/45</option>
<option value="power">Power 6/55</option>
<option value="lotto">Lotto 5/35</option>
<option value="keno">Keno</option>
<option value="bingo">Bingo 18</option>
<option value="max3d">Max 3D</option>
<option value="max3dpro">Max 3D Pro</option>
</select>

<select id="strategy">
<option value="balanced">Balanced</option>
<option value="aggressive">Aggressive (Hot)</option>
<option value="safe">Safe (No Cold)</option>
<option value="chaos">Random Chaos</option>
</select>

<br>

<select id="day"></select>
<select id="month"></select>
<select id="year"></select>

<br>

<button onclick="runUltraAI()">Chạy ULTRA AI</button>

<div class="result" id="result"></div>

<canvas id="chart" width="800" height="300"></canvas>

</div>

<script>

// populate date
for(let d=1; d<=31; d++) day.innerHTML+=`<option>${d}</option>`;
for(let m=1; m<=12; m++) month.innerHTML+=`<option>${m}</option>`;
for(let y=1950; y<=2026; y++) year.innerHTML+=`<option>${y}</option>`;

function normalize(n,max){
return ((n%max)+max)%max+1;
}

function rand(seed){
let x=Math.sin(seed)*10000;
return x-Math.floor(x);
}

function getConfig(game){
if(game==="mega") return {count:6,max:45};
if(game==="power") return {count:6,max:55};
if(game==="lotto") return {count:5,max:35};
if(game==="keno") return {count:10,max:80};
if(game==="bingo") return {count:18,max:90};
if(game==="max3d") return {count:1,max:1000};
if(game==="max3dpro") return {count:2,max:1000};
}

function simulateHotCold(max){
let freq=Array(max+1).fill(0);
for(let i=0;i<1000;i++){
let num=Math.floor(Math.random()*max)+1;
freq[num]++;
}
return freq;
}

function drawChart(freq){
let canvas=document.getElementById("chart");
let ctx=canvas.getContext("2d");
ctx.clearRect(0,0,800,300);
let maxVal=Math.max(...freq);
let barWidth=800/freq.length;

for(let i=1;i<freq.length;i++){
let height=(freq[i]/maxVal)*250;
ctx.fillStyle="#22c55e";
ctx.fillRect(i*barWidth,300-height,barWidth-1,height);
}
}

function runUltraAI(){

let game=gameSelect=document.getElementById("game").value;
let strategy=document.getElementById("strategy").value;
let config=getConfig(game);

let seed=day.value*1000000+month.value*10000+year.value+Date.now();

let freq=simulateHotCold(config.max);

let hot=freq.indexOf(Math.max(...freq));
let cold=freq.indexOf(Math.min(...freq.slice(1)));

let numbers=[];

while(numbers.length<config.count){

let r=Math.floor(rand(seed++)*config.max)+1;

if(strategy==="aggressive" && r!==hot) continue;
if(strategy==="safe" && r===cold) continue;

if(!numbers.includes(r)) numbers.push(r);
}

numbers.sort((a,b)=>a-b);

drawChart(freq);

document.getElementById("result").innerHTML=
`Kết quả: ${numbers.join(" - ")}<br>
🔥 Hot: ${hot} | ❄ Cold: ${cold}`;

}

</script>

</body>
</html>
