<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vietlott ULTRA AI</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background: linear-gradient(135deg,#fff9e6,#ffe082);
font-family: Arial, sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:500px;
padding:20px;
}

.header{
text-align:center;
margin-bottom:20px;
}

.title{
font-family:'Dancing Script',cursive;
font-size:34px;
color:#d50000;
}

.badge{
background:#ffcc00;
color:#000;
padding:5px 12px;
border-radius:20px;
font-size:13px;
display:inline-block;
margin-top:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.tabs{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:20px;
}

.tab-btn{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#ffcc00;
color:#000;
font-weight:bold;
cursor:pointer;
transition:0.3s;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.tab-btn:hover{
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

.section{
display:none;
margin-top:20px;
animation:fade 0.4s ease;
}

.active{
display:block;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

select,input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:10px;
}

button.generate{
width:100%;
padding:12px;
background:#ffcc00;
color:#000;
border:none;
border-radius:15px;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
transition:0.3s;
}

button.generate:hover{
transform:scale(1.05);
box-shadow:0 0 20px gold;
}

.result{
margin-top:20px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.ball{
width:45px;
height:45px;
background:#ffd600;
color:#000;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="title">Vietlott ULTRA AI</div>
<div class="badge">AI Edition Pro Max</div>
</div>

<div class="tabs">
<button class="tab-btn" onclick="showTab('product')">🎯 Sản phẩm</button>
<button class="tab-btn" onclick="showTab('birth')">🎂 Ngày sinh</button>
<button class="tab-btn" onclick="showTab('hot')">🔥 Số Hot</button>
<button class="tab-btn" onclick="showTab('popular')">💎 Chọn nhiều</button>
<button class="tab-btn" onclick="showTab('ai')">🚀 Cơ hội cao</button>
</div>

<!-- Sản phẩm -->
<div id="product" class="section active">
<select id="game">
<option value="mega">Mega 6/45</option>
<option value="power">Power 6/55</option>
</select>
<button class="generate" onclick="generateProduct()">Tạo số</button>
</div>

<!-- Ngày sinh -->
<div id="birth" class="section">
<input type="date" id="dob">
<button class="generate" onclick="generateBirth()">Tạo theo ngày sinh</button>
</div>

<!-- Hot -->
<div id="hot" class="section">
<button class="generate" onclick="generateHot()">Tạo số Hot</button>
</div>

<!-- Popular -->
<div id="popular" class="section">
<button class="generate" onclick="generatePopular()">Bộ số chọn nhiều</button>
</div>

<!-- AI -->
<div id="ai" class="section">
<button class="generate" onclick="generateAI()">AI Phân tích cơ hội cao</button>
</div>

<div class="result" id="result"></div>

</div>

<audio id="sound">
<source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" type="audio/ogg">
</audio>

<script>

function showTab(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.getElementById('result').innerHTML="";
}

function playSound(){
document.getElementById('sound').play();
}

function render(nums){
let result=document.getElementById('result');
result.innerHTML="";
nums.forEach(n=>{
let div=document.createElement('div');
div.className="ball";
div.textContent=n;
result.appendChild(div);
});
playSound();
}

function randomSet(count,max){
let arr=[];
while(arr.length<count){
let n=Math.floor(Math.random()*max)+1;
if(!arr.includes(n)) arr.push(n);
}
return arr.sort((a,b)=>a-b);
}

function generateProduct(){
let game=document.getElementById('game').value;
if(game==="mega") render(randomSet(6,45));
if(game==="power") render(randomSet(6,55));
}

function generateBirth(){
let dob=document.getElementById('dob').value;
if(!dob){alert("Vui lòng nhập ngày sinh");return;}
let nums=dob.replaceAll("-","").split("").map(n=>parseInt(n));
let result=[];
nums.forEach(n=>{
let val=(n%9)+1;
if(!result.includes(val)) result.push(val);
});
while(result.length<6){
let add=Math.floor(Math.random()*9)+1;
if(!result.includes(add)) result.push(add);
}
render(result.slice(0,6).sort((a,b)=>a-b));
}

function generateHot(){
render([3,7,18,25,32,44]);
}

function generatePopular(){
render([5,12,19,28,36,41]);
}

function generateAI(){
render([8,16,23,29,37,52]);
}

</script>

</body>
</html>
