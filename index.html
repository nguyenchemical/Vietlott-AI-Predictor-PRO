<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vietlott ULTRA AI</title>

<style>
:root{
--bg:#0f172a;
--card:#1e293b;
--text:white;
--accent:#22c55e;
}

.light{
--bg:#f1f5f9;
--card:white;
--text:black;
--accent:#2563eb;
}

body{
font-family:Arial, sans-serif;
background:var(--bg);
color:var(--text);
text-align:center;
padding:20px;
transition:0.3s;
}

.container{
max-width:750px;
margin:auto;
background:var(--card);
padding:25px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

h1{
color:var(--accent);
margin-bottom:5px;
}

.badge{
display:inline-block;
background:var(--accent);
color:white;
padding:5px 15px;
border-radius:20px;
font-size:12px;
margin-bottom:15px;
box-shadow:0 0 15px var(--accent);
}

select,button{
padding:10px;
margin:6px;
border-radius:10px;
border:none;
}

button{
background:var(--accent);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px var(--accent);
}

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:10px;
}

.number-ball{
display:inline-block;
background:#facc15;       /* Nền vàng */
color:black;              /* Số màu đen */
padding:12px 16px;
margin:6px;
border-radius:50%;
font-weight:bold;
box-shadow:0 0 10px rgba(250,204,21,0.8);
animation:pop 0.3s ease;
}

@keyframes pop{
from{transform:scale(0.6);}
to{transform:scale(1);}
}

.info{
margin-top:10px;
font-size:14px;
color:#facc15;
}

canvas{
background:white;
border-radius:10px;
margin-top:20px;
}

.mode-toggle{
float:right;
cursor:pointer;
font-size:14px;
}
</style>
</head>
<body>

<div class="container">

<div class="mode-toggle" onclick="toggleMode()">🌙 Sáng/Tối</div>

<h1>🎯 Vietlott ULTRA AI</h1>
<div class="badge">AI Edition</div>

<select id="game">
<option value="mega">Mega 6/45</option>
<option value="power">Power 6/55</option>
<option value="lotto">Lotto 5/35</option>
<option value="keno">Keno</option>
<option value="bingo">Bingo 18</option>
<option value="max3d">Max 3D</option>
<option value="max3dpro">Max 3D Pro</option>
</select>

<select id="strategy">
<option value="balanced">Balanced</option>
<option value="aggressive">Aggressive (Ưu tiên Hot)</option>
<option value="safe">Safe (Loại Cold)</option>
<option value="chaos">Random Chaos</option>
</select>

<h3>Tạo số theo ngày sinh</h3>

<div class="tabs">
<select id="day"></select>
<select id="month"></select>
<select id="year"></select>
</div>

<button onclick="runUltraAI()">🚀 Chạy ULTRA AI</button>

<div id="result"></div>
<div class="info" id="info"></div>

<canvas id="chart" width="650" height="250"></canvas>

</div>

<script>

// Tạo danh sách ngày tháng năm
for(let d=1; d<=31; d++)
document.getElementById("day").innerHTML+=`<option value="${d}">${d}</option>`;

for(let m=1; m<=12; m++)
document.getElementById("month").innerHTML+=`<option value="${m}">${m}</option>`;

for(let y=1950; y<=2026; y++)
document.getElementById("year").innerHTML+=`<option value="${y}">${y}</option>`;

// Lấy cấu hình từng game
function getConfig(game){
if(game==="mega") return {count:6,max:45};
if(game==="power") return {count:6,max:55};
if(game==="lotto") return {count:5,max:35};
if(game==="keno") return {count:10,max:80};
if(game==="bingo") return {count:18,max:90};
if(game==="max3d") return {count:1,max:1000};
if(game==="max3dpro") return {count:2,max:1000};
}

// Sinh số ngẫu nhiên an toàn
function generateNumbers(config,strategy,seed){

let numbers=[];
let attempts=0;
let maxAttempts=10000;

let freq=Array(config.max+1).fill(0);

// Giả lập hot/cold
for(let i=0;i<500;i++){
let r=Math.floor(Math.random()*config.max)+1;
freq[r]++;
}

let hot=freq.indexOf(Math.max(...freq));
let cold=freq.slice(1).indexOf(Math.min(...freq.slice(1)))+1;

while(numbers.length<config.count && attempts<maxAttempts){

let r=Math.floor(Math.random()*config.max)+1;

if(strategy==="safe" && r===cold){ attempts++; continue; }

if(!numbers.includes(r)){
numbers.push(r);
}

attempts++;
}

// Nếu aggressive → đảm bảo có hot number
if(strategy==="aggressive" && !numbers.includes(hot)){
numbers[0]=hot;
}

numbers.sort((a,b)=>a-b);

return {numbers,hot,cold,freq};
}

// Vẽ biểu đồ nhẹ để không lag
function drawChart(freq){
let canvas=document.getElementById("chart");
let ctx=canvas.getContext("2d");
ctx.clearRect(0,0,650,250);

let maxVal=Math.max(...freq);
let barWidth=650/freq.length;

for(let i=1;i<freq.length;i++){
let height=(freq[i]/maxVal)*200;
ctx.fillStyle="#22c55e";
ctx.fillRect(i*barWidth,250-height,barWidth-1,height);
}
}

function runUltraAI(){

let game=document.getElementById("game").value;
let strategy=document.getElementById("strategy").value;
let config=getConfig(game);

let result=generateNumbers(config,strategy,Date.now());

drawChart(result.freq);

let html="";
result.numbers.forEach(n=>{
html+=`<div class="number-ball">${n}</div>`;
});

document.getElementById("result").innerHTML=html;
document.getElementById("info").innerHTML=
`🔥 Hot: ${result.hot} | ❄ Cold: ${result.cold}`;
}

function toggleMode(){
document.body.classList.toggle("light");
}

</script>
</body>
</html>
