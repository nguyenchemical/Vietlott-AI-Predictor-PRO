<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Vietlott AI Predictor PRO 15.0 ULTRA</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

h1{
color:#ffd700;
}

.tabs button{
background:#ffd700;
border:none;
padding:12px 18px;
margin:4px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.status{
margin-top:10px;
color:#00ff9c;
cursor:pointer;
}

.result{
margin-top:30px;
}

.ball{
width:60px;
height:60px;
line-height:60px;
border-radius:50%;
background:#ff2a2a;
display:inline-block;
margin:6px;
font-size:22px;
font-weight:bold;
animation:pop 0.4s;
}

@keyframes pop{
0%{transform:scale(0)}
100%{transform:scale(1)}
}

.fireworks{
font-size:35px;
margin-top:10px;
animation:boom 1s infinite;
}

@keyframes boom{
0%{transform:scale(1)}
50%{transform:scale(1.4)}
100%{transform:scale(1)}
}

.analysis{
margin-top:20px;
background:#1b1b1b;
padding:15px;
border-radius:10px;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
}

.popup-box{
background:#1b1b1b;
padding:20px;
margin:120px auto;
width:260px;
border-radius:10px;
}

input{
padding:8px;
margin:5px;
width:80%;
}

</style>

</head>

<body>

<h1>Vietlott AI Predictor PRO 15.0 ULTRA</h1>

<div class="tabs">

<button onclick="predictMega()">Mega 6/45</button>
<button onclick="predictPower()">Power 6/55</button>
<button onclick="predictKeno()">Keno</button>
<button onclick="predictMax3D()">Max3D</button>

<br>

<button onclick="openBirthday()">🎂 Tạo số theo ngày sinh</button>

</div>

<div class="status" onclick="openSite()">
Đang kết nối thời gian thực Vietlott
</div>

<div class="result">

<h2>Kết quả dự đoán AI</h2>

<div id="numbers"></div>

<div id="fire"></div>

</div>

<div class="analysis">

<h3>AI Phân tích dữ liệu</h3>

<p>🔥 Số HOT: <span id="hot"></span></p>
<p>❄️ Số lạnh: <span id="cold"></span></p>
<p>📊 Tần suất cao: <span id="freq"></span></p>

</div>

<div class="popup" id="birth">

<div class="popup-box">

<h3>Ngày sinh</h3>

<input id="d" placeholder="Ngày"><br>
<input id="m" placeholder="Tháng"><br>
<input id="y" placeholder="Năm"><br>

<button onclick="generateBirthday()">Tạo số</button>

</div>

</div>

<audio id="sound">
<source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<script>

function rand(count,max){

let arr=[]

while(arr.length<count){

let n=Math.floor(Math.random()max)+1

if(!arr.includes(n)) arr.push(n)

}

return arr.sort((a,b)=>a-b)

}

function display(nums){

let box=document.getElementById("numbers")

box.innerHTML=""

let sound=document.getElementById("sound")

nums.forEach((n,i)=>{

setTimeout(()=>{

let b=document.createElement("div")

b.className="ball"

b.innerText=n

box.appendChild(b)

sound.play()

},i400)

})

setTimeout(()=>{

document.getElementById("fire").innerHTML="🎆 🎆 🎆"

},nums.length400)

ai(nums)

}

function predictMega(){

display(rand(6,45))

}

function predictPower(){

display(rand(6,55))

}

function predictKeno(){

display(rand(10,80))

}

function predictMax3D(){

display(rand(3,9))

}

function ai(nums){

document.getElementById("hot").innerText=nums.slice(0,2)

document.getElementById("cold").innerText=nums.slice(2,4)

document.getElementById("freq").innerText=nums.slice(4)

}

function openBirthday(){

document.getElementById("birth").style.display="block"

}

function generateBirthday(){

let d=Number(document.getElementById("d").value)
let m=Number(document.getElementById("m").value)
let y=Number(document.getElementById("y").value)

let seed=d+m+y

let nums=[]

for(let i=0;i<6;i++){

nums.push((seed+i11)%45+1)

}

nums=[...new Set(nums)]

display(nums)

document.getElementById("birth").style.display="none"

}

function openSite(){

window.open("https://vietlott.vn")

}

</script>

</body>
</html>
